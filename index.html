<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="weather-card">
        <h1>Weather Today</h1>

        <div id="search-box">
            <input type="text" id="cityInput" placeholder="Your City">
            <button id="searchBtn">Search</button>
        </div>
        <h3>Recent search</h3>
        <div id="history"></div>

        <p id="status"></p>
        
        <div id="weatherResult">
            <h2 id="icons"></h2>
            <p id="city"></p>
            <p id="temperature"></p>
            <p id="description"></p>
            <p id="wind"></p>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
